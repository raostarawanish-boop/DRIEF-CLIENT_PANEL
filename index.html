<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>DRIP Client Panel</h1>
        <h3>Built for Stability. Designed for Safe Gaming.</h3>
    </header>

    <section class="payment-info">
        <h2>Select Payment Plan</h2>
        <form>
            <label for="plan">Choose Plan:</label>
            <select id="plan" name="plan">
                <option value="1-day">1-DAY - ₹99</option>
                <option value="7-day">7-DAY - ₹299</option>
            </select>

            <label for="utr">Enter UTR:</label>
            <input type="text" id="utr" name="utr" placeholder="Enter UTR" required>

            <button type="submit">Send SMS</button>
        </form>
    </section>

    <footer>
        <p>Customer Support: 09953794428</p>
    </footer>

</body>
</html>
